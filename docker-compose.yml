services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: senseidb-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - senseidb_data:/app/data
      - ./backend/db.sqlite3:/app/db.sqlite3 # Persistência direta para facilitar acesso no Oracle Linux
    environment:
      - PORT=8000
      - DATABASE_URL=sqlite:////app/db.sqlite3
    networks:
      - senseidb-network

  # Frontend pode ser adicionado aqui futuramente se necessário rodar via Docker local
  # No momento, o foco é a estabilidade do motor de IA no Backend.

volumes:
  senseidb_data:

networks:
  senseidb-network:
    driver: bridge
