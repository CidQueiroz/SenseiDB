name: Deploy Frontend to Firebase Hosting (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_production:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout SenseiDB Repository
        uses: actions/checkout@v4
      - name: 2. Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@cidqueiroz'

      - name: 3. Install and Build Frontend
        run: |
          npm install
          npm run build -w frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: 4. Verify build output
        run: |
          echo "Verificando dist..."
          ls -la frontend/dist/
          
      - name: 4. Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 5. Deploy to Firebase Production
        run: firebase deploy --only hosting:senseidb-agent --project cdkteck-hub --token "${{ secrets.FIREBASE_TOKEN }}"
        working-directory: . # Deploy runs relative to the root
